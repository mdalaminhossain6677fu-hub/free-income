<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Site</title>

<style>
body{
  font-family: Arial;
  background:#f2f2f2;
  text-align:center;
  padding:20px;
}

.box{
  background:white;
  padding:20px;
  margin:15px auto;
  max-width:350px;
  border-radius:10px;
  box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input,button{
  width:90%;
  padding:12px;
  margin:8px;
  border-radius:6px;
  border:1px solid #ccc;
  font-size:16px;
}

button{
  background:#28a745;
  color:white;
  border:none;
  cursor:pointer;
}

button:hover{
  background:#218838;
}

#dashboard{display:none;}
</style>
</head>

<body>

<h2>🔥 My Website</h2>

<!-- REGISTER -->
<div class="box" id="registerBox">
<h3>Register</h3>
<input type="text" id="regUser" placeholder="Username">
<input type="password" id="regPass" placeholder="Password">
<button onclick="register()">One Click Register</button>
</div>

<!-- LOGIN -->
<div class="box" id="loginBox">
<h3>Login</h3>
<input type="text" id="logUser" placeholder="Username">
<input type="password" id="logPass" placeholder="Password">
<button onclick="login()">One Click Login</button>
</div>

<!-- DASHBOARD -->
<div class="box" id="dashboard">
<h3>Welcome <span id="showUser"></span></h3>
<h2>Balance: ৳ <span id="balance">0</span></h2>

<input type="number" id="withdrawAmount" placeholder="Withdraw amount">
<button onclick="withdraw()">Withdraw</button>

<br><br>
<button onclick="logout()" style="background:red;">Logout</button>
</div>

<script>

// ===== REGISTER =====
function register(){
  let user=document.getElementById("regUser").value;
  let pass=document.getElementById("regPass").value;

  if(user==""||pass==""){
    alert("Fill all fields");
    return;
  }

  localStorage.setItem("username",user);
  localStorage.setItem("password",pass);
  localStorage.setItem("balance",100); // bonus balance

  alert("Register Success! Now Login");
}

// ===== LOGIN =====
function login(){
  let user=document.getElementById("logUser").value;
  let pass=document.getElementById("logPass").value;

  let savedUser=localStorage.getItem("username");
  let savedPass=localStorage.getItem("password");

  if(user===savedUser && pass===savedPass){
    document.getElementById("loginBox").style.display="none";
    document.getElementById("registerBox").style.display="none";
    document.getElementById("dashboard").style.display="block";

    document.getElementById("showUser").innerText=user;
    document.getElementById("balance").innerText=localStorage.getItem("balance");
  }else{
    alert("Wrong login info");
  }
}

// ===== WITHDRAW =====
function withdraw(){
  let amount=parseInt(document.getElementById("withdrawAmount").value);
  let balance=parseInt(localStorage.getItem("balance"));

  if(isNaN(amount) || amount<=0){
    alert("Enter valid amount");
    return;
  }

  if(amount>balance){
    alert("Not enough balance");
    return;
  }

  balance-=amount;
  localStorage.setItem("balance",balance);
  document.getElementById("balance").innerText=balance;

  alert("Withdraw Success");
}

// ===== LOGOUT =====
function logout(){
  location.reload();
}

</script>

</body>
</html>
