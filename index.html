<!DOCTYPE html>
<html>
<head>
<title>Free Income</title>
<style>
body{
  font-family: Arial;
  text-align:center;
  background:#f2f2f2;
}
.box{
  background:#fff;
  max-width:400px;
  margin:15px auto;
  padding:15px;
  border-radius:10px;
}
input,button{
  padding:10px;
  margin:6px;
  width:90%;
}
.balance{
  font-size:22px;
  color:green;
  font-weight:bold;
}
</style>
</head>

<body>

<h1>💰 Free Income</h1>

<!-- REGISTER -->
<div class="box">
<h3>Register</h3>
<input id="ruser" placeholder="Username"><br>
<input id="rpass" type="password" placeholder="Password"><br>
<input id="ref" placeholder="Referral (optional)"><br>
<button onclick="register()">Register</button>
</div>

<!-- LOGIN -->
<div class="box">
<h3>Login</h3>
<input id="luser" placeholder="Username"><br>
<input id="lpass" type="password" placeholder="Password"><br>
<button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div class="box" id="dash" style="display:none">
<h3>Dashboard</h3>
<p class="balance">Balance: ৳<span id="money">0</span></p>

  

<button onclick="logout()">🚪 Logout</button>
<h4>Withdraw Request</h4>
<input id="paynum" placeholder="bKash/Nagad Number"><br>
<input id="amount" type="number" placeholder="Amount"><br>
<button onclick="withdraw()">Send Withdraw</button>

<p id="wmsg" style="color:green;font-weight:bold;"></p>
<p>Your Referral Link:</p>
<input id="reflink" readonly>
</div>

<script>
// ===== STORAGE =====
let users = JSON.parse(localStorage.getItem("users") || "{}");
let currentUser = null;

function save(){
  localStorage.setItem("users", JSON.stringify(users));
}

// ===== AUTO REF DETECT =====
const urlParams = new URLSearchParams(location.search);
if(urlParams.get("ref")){
  document.getElementById("ref").value = urlParams.get("ref");
}

// ===== REGISTER =====
function register(){
  let u = document.getElementById("ruser").value.trim();
  let p = document.getElementById("rpass").value.trim();
  let refCode = document.getElementById("ref").value.trim();

  if(!u || !p){
    alert("Username & Password দিন");
    return;
  }

  if(users[u]){
    alert("User already exists");
    return;
  }

  users[u] = {pass:p, money:0};

  // referral bonus
  if(refCode && users[refCode]){
    users[refCode].money += 5;
  }

  save();
  alert("Registered সফল ✅");
}

// ===== LOGIN =====
function login(){
  let u = document.getElementById("luser").value.trim();
  let p = document.getElementById("lpass").value.trim();

  if(users[u] && users[u].pass === p){
    currentUser = u;
    document.getElementById("dash").style.display = "block";
    document.getElementById("money").innerText = users[u].money;
    document.getElementById("reflink").value =
      location.href.split("?")[0] + "?ref=" + u;
  }else{
    alert("Login ভুল ❌");
  }
}

// ===== EARN =====
function earn(){
  if(!currentUser) return;
  users[currentUser].money += 10;
  document.getElementById("money").innerText = users[currentUser].money;
  save();
}

// ===== WITHDRAW =====
function withdraw(){
  if(!currentUser) return;

  let num = document.getElementById("paynum").value.trim();
  let amount = parseInt(document.getElementById("amount").value);
  let msg = document.getElementById("wmsg");

  if(!num || !amount){
    msg.style.color = "red";
    msg.innerText = "সব তথ্য পূরণ করো";
    return;
  }

  if(amount < 50){
    msg.style.color = "red";
    msg.innerText = "Minimum 50 টাকা লাগবে";
    return;
  }

  if(users[currentUser].money < amount){
    msg.style.color = "red";
    msg.innerText = "Balance কম আছে";
    return;
  }

  users[currentUser].money -= amount;
  document.getElementById("money").innerText = users[currentUser].money;
  save();

  msg.style.color = "green";
  msg.innerText = "Withdraw request sent ✅";
}
  currentUser = null;
  document.getElementById("dash").style.display = "none";
}
</script>

</body>
</html>
