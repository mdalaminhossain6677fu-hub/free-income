<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>Relax Income Pro</title>
<style>
body{font-family:Arial;background:#f2f4f8;margin:0}
.card{max-width:420px;margin:20px auto;background:#fff;padding:20px;border-radius:14px;box-shadow:0 4px 12px rgba(0,0,0,.08)}
input,button{width:100%;padding:12px;margin:6px 0;border-radius:8px;border:1px solid #ddd;font-size:14px}
button{background:linear-gradient(90deg,#2b6cff,#00b894);color:#fff;border:none;font-weight:bold;cursor:pointer}
.hidden{display:none}
.task{border:1px solid #eee;padding:10px;border-radius:10px;margin:8px 0}
.small{font-size:12px;color:#666}
</style>
</head>
<body><!-- REGISTER --><div class="card" id="registerPage">
<h2>Create Account</h2>
<input id="ref" placeholder="Referral Code (optional)">
<input id="name" placeholder="Full Name">
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">
<button onclick="register()">Register Now</button>
<p class="small">Already member? <a href="#" onclick="showLogin()">Login</a></p>
</div><!-- LOGIN --><div class="card hidden" id="loginPage">
<h2>Login</h2>
<input id="loginEmail" placeholder="Email">
<input id="loginPass" type="password" placeholder="Password">
<button onclick="login()">Login Now</button>
</div><!-- DASHBOARD --><div class="card hidden" id="dash">
<h3 id="welcome"></h3>
<p><b>Balance:</b> ৳<span id="bal">0</span></p>
<p><b>Your Referral:</b> <span id="myref"></span></p><button onclick="dailyBonus()">🎁 Daily Bonus +5</button>

<h4>📺 Video Tasks</h4>
<div id="tasks"></div><h4>💰 Withdraw</h4>
<input id="wdAmount" placeholder="Amount">
<input id="wdNumber" placeholder="Bkash/Nagad Number">
<button onclick="withdraw()">Withdraw Now</button><h4>🧾 Withdraw History</h4>
<div id="history" class="small"></div><button onclick="logout()">Logout</button>

</div><script>
// ===== DATA =====
const TASKS=[{id:1,reward:12},{id:2,reward:10},{id:3,reward:8},{id:4,reward:6},{id:5,reward:5}];
function getUsers(){return JSON.parse(localStorage.getItem('users')||'[]')}
function saveUsers(u){localStorage.setItem('users',JSON.stringify(u))}

// ===== NAV =====
function showLogin(){registerPage.classList.add('hidden');loginPage.classList.remove('hidden')}
function showDash(){registerPage.classList.add('hidden');loginPage.classList.add('hidden');dash.classList.remove('hidden')}

// ===== REGISTER =====
function register(){
 let name=nameEl().value.trim();
 let email=emailEl().value.trim();
 let pass=passEl().value.trim();
 let refInput=document.getElementById('ref').value.trim();
 if(!name||!email||!pass) return alert('সব তথ্য দিন');
 let users=getUsers();
 if(users.find(u=>u.email===email)) return alert('Email already used');
 let myRef='REF'+Math.random().toString(36).slice(2,7).toUpperCase();
 let user={name,email,pass,balance:0,myRef,done:[],withdraw:[],lastBonus:0};
 users.push(user);
 if(refInput){let refUser=users.find(u=>u.myRef===refInput);if(refUser){refUser.balance+=5}}
 saveUsers(users);
 localStorage.setItem('currentUser',email);
 loadDash();
}

// ===== LOGIN =====
function login(){
 let email=document.getElementById('loginEmail').value.trim();
 let pass=document.getElementById('loginPass').value.trim();
 let users=getUsers();
 let user=users.find(u=>u.email===email && u.pass===pass);
 if(!user) return alert('Login failed');
 localStorage.setItem('currentUser',email);
 loadDash();
}

// ===== DASH =====
function loadDash(){
 let email=localStorage.getItem('currentUser');
 if(!email) return;
 let users=getUsers();
 let user=users.find(u=>u.email===email);
 showDash();
 welcome.innerText='Welcome, '+user.name;
 bal.innerText=user.balance;
 myref.innerText=user.myRef;
 renderTasks(user);
 showWithdraw(user);
}

// ===== TASKS =====
function renderTasks(user){
 tasks.innerHTML='';
 TASKS.forEach(t=>{
  let done=user.done.includes(t.id);
  tasks.innerHTML+=`<div class="task">🎬 Watch Video — ৳${t.reward}<br><button ${done?'disabled':''} onclick="watchTask(${t.id})">${done?'Completed':'Watch 10s'}</button></div>`;
 })
}

function watchTask(id){
 let email=localStorage.getItem('currentUser');
 let users=getUsers();
 let user=users.find(u=>u.email===email);
 if(user.done.includes(id)) return;
 alert('ভিডিও চলছে 10 সেকেন্ড...');
 setTimeout(()=>{
   let task=TASKS.find(x=>x.id===id);
   user.balance+=task.reward;
   user.done.push(id);
   saveUsers(users);
   loadDash();
   alert('Income added ✅');
 },10000);
}

// ===== DAILY BONUS =====
function dailyBonus(){
 let email=localStorage.getItem('currentUser');
 let users=getUsers();
 let user=users.find(u=>u.email===email);
 let today=new Date().toDateString();
 if(user.lastBonus===today) return alert('আজকে নেওয়া হয়েছে');
 user.balance+=5;
 user.lastBonus=today;
 saveUsers(users);
 loadDash();
}

// ===== WITHDRAW =====
function withdraw(){
 let amount=parseInt(wdAmount.value);
 let number=wdNumber.value.trim();
 let email=localStorage.getItem('currentUser');
 let users=getUsers();
 let user=users.find(u=>u.email===email);
 if(!amount||amount<50) return alert('Minimum ৳50');
 if(amount>user.balance) return alert('Balance কম');
 if(!number) return alert('Number দিন');
 user.balance-=amount;
 user.withdraw.push({amount,number,date:new Date().toLocaleString(),status:'Pending'});
 saveUsers(users);
 loadDash();
}

function showWithdraw(user){
 history.innerHTML='';
 user.withdraw.slice().reverse().forEach(w=>{history.innerHTML+=`৳${w.amount} → ${w.number} (${w.status})<br>`})
}

// ===== LOGOUT =====
function logout(){localStorage.removeItem('currentUser');location.reload()}

function nameEl(){return document.getElementById('name')}
function emailEl(){return document.getElementById('email')}
function passEl(){return document.getElementById('pass')}

window.onload=loadDash;
</script></body>
</html>
