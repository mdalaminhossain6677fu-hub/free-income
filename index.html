<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Relax Income Clone</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{font-family:Arial;background:#f2f2f2;margin:0;padding:20px}
.box{max-width:400px;margin:auto;background:#fff;padding:20px;border-radius:10px}
input,button{width:100%;padding:12px;margin-top:10px;border-radius:6px;border:1px solid #ccc}
button{background:linear-gradient(90deg,#2d6cdf,#00c9a7);color:#fff;font-weight:bold;border:none}
.task{border:1px solid #ddd;padding:10px;margin-top:10px;border-radius:6px}
</style>
</head>
<body>

<div class="box" id="registerBox">
<h2>Create Account</h2>

<input id="ref" placeholder="Referral Code (optional)">
<input id="name" placeholder="Full Name">
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">

<button onclick="register()">Register Now</button>
</div>

<div class="box" id="dashboard" style="display:none">
<h2>Dashboard</h2>
<p><b>Name:</b> <span id="dname"></span></p>
<p><b>Balance:</b> ৳<span id="balance">0</span></p>
<p><b>Your Referral Code:</b> <span id="myref"></span></p>

<h3>Video Tasks</h3>

<div id="tasks"></div>

<h3>Withdraw</h3>
<input id="withdrawAmount" placeholder="Amount">
<input id="withdrawNumber" placeholder="Bkash/Nagad Number">
<button onclick="withdraw()">Withdraw Now</button>

<h4>Withdraw History</h4>
<ul id="history"></ul>

<button onclick="logout()">Logout</button>
</div>

<script>
// ===== AUTO LOGIN CHECK =====
let user = JSON.parse(localStorage.getItem("user"));
if(user){ showDashboard(); }

// ===== REGISTER (ONE CLICK) =====
function register(){
  let name=document.getElementById("name").value;
  let email=document.getElementById("email").value;
  let pass=document.getElementById("pass").value;
  let ref=document.getElementById("ref").value;

  if(!name||!email||!pass){alert("Fill all fields");return;}

  let newUser={
    name:name,
    email:email,
    pass:pass,
    balance:0,
    refCode:"REF"+Math.floor(Math.random()*1000000),
    tasks:[false,false,false,false,false],
    withdraw:[]
  };

  localStorage.setItem("user",JSON.stringify(newUser));
  showDashboard();
}

// ===== SHOW DASHBOARD =====
function showDashboard(){
  document.getElementById("registerBox").style.display="none";
  document.getElementById("dashboard").style.display="block";

  let user=JSON.parse(localStorage.getItem("user"));

  document.getElementById("dname").innerText=user.name;
  document.getElementById("balance").innerText=user.balance;
  document.getElementById("myref").innerText=user.refCode;

  loadTasks();
  loadHistory();
}

// ===== TASKS =====
let rewards=[10,12,10,11,12];

function loadTasks(){
  let user=JSON.parse(localStorage.getItem("user"));
  let html="";

  for(let i=0;i<5;i++){
    html+=`
    <div class="task">
      Watch Video ${i+1} — ৳${rewards[i]}
      <button onclick="doTask(${i})">
      ${user.tasks[i]?"Completed":"Start"}
      </button>
    </div>`;
  }

  document.getElementById("tasks").innerHTML=html;
}

function doTask(i){
  let user=JSON.parse(localStorage.getItem("user"));
  if(user.tasks[i]) return;

  user.tasks[i]=true;
  user.balance+=rewards[i];

  localStorage.setItem("user",JSON.stringify(user));
  showDashboard();
}

// ===== WITHDRAW =====
function withdraw(){
  let amount=parseInt(document.getElementById("withdrawAmount").value);
  let number=document.getElementById("withdrawNumber").value;

  let user=JSON.parse(localStorage.getItem("user"));

  if(amount>user.balance){alert("Insufficient balance");return;}
  if(!number){alert("Enter number");return;}

  user.balance-=amount;
  user.withdraw.push(amount+" ৳ → "+number);

  localStorage.setItem("user",JSON.stringify(user));
  showDashboard();
}

// ===== HISTORY =====
function loadHistory(){
  let user=JSON.parse(localStorage.getItem("user"));
  let html="";
  user.withdraw.forEach(w=> html+="<li>"+w+"</li>");
  document.getElementById("history").innerHTML=html;
}

// ===== LOGOUT =====
function logout(){
  localStorage.removeItem("user");
  location.reload();
}
</script>

</body>
</html>
