<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Income Site Pro</title>
<style>
body{font-family:Arial;background:#f2f2f2;padding:20px}
.box{max-width:420px;margin:auto;background:#fff;padding:20px;border-radius:10px}
input,button{width:100%;padding:10px;margin:6px 0}
button{background:linear-gradient(45deg,#2b7cff,#00c6a7);color:#fff;border:none;border-radius:6px;font-size:16px}
.task{border:1px solid #ddd;padding:10px;margin:8px 0;border-radius:6px}
</style>
</head>
<body>

<!-- ================= AUTH ================= -->
<div class="box" id="authBox">
<h2>Create Account</h2>

<input id="name" placeholder="Full Name">
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">
<button type="button" onclick="register()">Register Now</button>

<hr>

<h3>Login</h3>
<input id="loginEmail" placeholder="Email">
<input id="loginPass" type="password" placeholder="Password">
<button type="button" onclick="login()">Login</button>
</div>

<!-- ================= DASHBOARD ================= -->
<div class="box" id="dashBox" style="display:none">
<h2>Dashboard</h2>

<p><b>Name:</b> <span id="dName"></span></p>
<p><b>Balance:</b> ৳<span id="dBal">0</span></p>
<p><b>Your Referral Code:</b> <span id="dRef"></span></p>

<hr>
<h3>🎬 Video Tasks</h3>
<div id="tasks"></div>

<hr>
<h3>💸 Withdraw</h3>
<input id="withdrawAmount" placeholder="Amount (৳)">
<input id="withdrawNumber" placeholder="Bkash/Nagad Number">
<button onclick="withdraw()">Withdraw Now</button>

<h4>Withdraw History</h4>
<div id="withdrawHistory"></div>

<br>
<button onclick="logout()">Logout</button>
</div>

<script>
// ---------- TASK LIST ----------
let videoTasks = [
  {id:1, reward:10},
  {id:2, reward:12},
  {id:3, reward:10},
  {id:4, reward:11},
  {id:5, reward:12}
];

// ---------- REGISTER (ONE CLICK) ----------
function register(){

  let name = document.getElementById("name").value.trim();
  let email = document.getElementById("email").value.trim();
  let pass = document.getElementById("pass").value.trim();

  if(!name || !email || !pass){
    alert("সব তথ্য দিন");
    return;
  }

  let refCode = "REF" + Date.now();

  let user = {
    name:name,
    email:email,
    pass:pass,
    balance:0,
    ref:refCode,
    doneTasks:[],
    withdrawHistory:[]
  };

  localStorage.setItem("user_"+email, JSON.stringify(user));
  localStorage.setItem("currentUser", email);

  alert("Register সফল ✅");

  loadDashboard();
}

// ---------- LOGIN ----------
function login(){

  let email = document.getElementById("loginEmail").value.trim();
  let pass = document.getElementById("loginPass").value.trim();

  let data = localStorage.getItem("user_"+email);

  if(!data){
    alert("User নেই");
    return;
  }

  let user = JSON.parse(data);

  if(user.pass !== pass){
    alert("Password ভুল");
    return;
  }

  localStorage.setItem("currentUser", email);
  loadDashboard();
}

// ---------- DASHBOARD ----------
function loadDashboard(){

  let email = localStorage.getItem("currentUser");
  if(!email) return;

  let user = JSON.parse(localStorage.getItem("user_"+email));

  authBox.style.display="none";
  dashBox.style.display="block";

  dName.innerText = user.name;
  dBal.innerText = user.balance;
  dRef.innerText = user.ref;

  renderTasks(user);
  showWithdraw(user);
}

// ---------- TASK RENDER ----------
function renderTasks(user){

  tasks.innerHTML="";

  videoTasks.forEach(t=>{

    let done = user.doneTasks.includes(t.id);

    tasks.innerHTML += `
      <div class="task">
        🎥 Watch Video ${t.id} — ৳${t.reward}<br>
        <button ${done?"disabled":""} onclick="doTask(${t.id})">
          ${done?"Completed":"Watch & Earn"}
        </button>
      </div>
    `;
  });
}

// ---------- DO TASK ----------
function doTask(id){

  let email = localStorage.getItem("currentUser");
  let user = JSON.parse(localStorage.getItem("user_"+email));

  let task = videoTasks.find(x=>x.id===id);

  if(user.doneTasks.includes(id)) return;

  user.balance += task.reward;
  user.doneTasks.push(id);

  localStorage.setItem("user_"+email, JSON.stringify(user));

  loadDashboard();
}

// ---------- WITHDRAW ----------
function withdraw(){

  let email = localStorage.getItem("currentUser");
  let user = JSON.parse(localStorage.getItem("user_"+email));

  let amount = parseInt(document.getElementById("withdrawAmount").value);
  let number = document.getElementById("withdrawNumber").value.trim();

  if(!amount || amount < 50){
    alert("Minimum withdraw ৳50");
    return;
  }

  if(amount > user.balance){
    alert("Balance কম আছে");
    return;
  }

  if(!number){
    alert("Number দিন");
    return;
  }

  user.balance -= amount;

  user.withdrawHistory.push({
    amount:amount,
    number:number,
    date:new Date().toLocaleString(),
    status:"Pending"
  });

  localStorage.setItem("user_"+email, JSON.stringify(user));

  alert("Withdraw Request Submitted ✅");

  loadDashboard();
}

// ---------- SHOW WITHDRAW ----------
function showWithdraw(user){

  withdrawHistory.innerHTML="";

  if(!user.withdrawHistory) return;

  user.withdrawHistory.slice().reverse().forEach(w=>{
    withdrawHistory.innerHTML += `
      <div class="task">
        ৳${w.amount} → ${w.number}<br>
        ${w.date}<br>
        <b>${w.status}</b>
      </div>
    `;
  });
}

// ---------- LOGOUT ----------
function logout(){
  localStorage.removeItem("currentUser");
  location.reload();
}

// auto login
window.onload = loadDashboard;
</script>

</body>
</html>
