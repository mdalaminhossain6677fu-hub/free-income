<!DOCTYPE html>
<html>
<head>
<title>Free Income</title>
<style>
body{font-family:Arial;text-align:center;background:#f2f2f2}
.box{background:#fff;width:320px;margin:10px auto;padding:15px;border-radius:10px}
input,button{padding:10px;margin:5px;width:90%}
.balance{font-size:22px;color:green;font-weight:bold}
</style>
</head>

<body>

<h1>💰 Free Income</h1>

<div class="box">
<h3>Register</h3>
<input id="ruser" placeholder="Username"><br>
<input id="rpass" type="password" placeholder="Password"><br>
<input id="ref" placeholder="Referral (optional)"><br>
<button onclick="register()">Register</button>
</div>

<div class="box">
<h3>Login</h3>
<input id="luser" placeholder="Username"><br>
<input id="lpass" type="password" placeholder="Password"><br>
<button onclick="login()">Login</button>
</div>

<div class="box" id="dash" style="display:none">
<h3>Dashboard</h3>
<p class="balance">Balance: ৳<span id="money">0</span></p>

<button onclick="earn()">🎁 Earn 10 Taka</button><br>
<button onclick="withdraw()">💸 Withdraw</button><br>
<button onclick="logout()">Logout</button>

<p>Your Referral Link:</p>
<input id="reflink" readonly>
</div>

<script>

let users = JSON.parse(localStorage.getItem("users")||"{}");
let currentUser = null;

function save(){
localStorage.setItem("users",JSON.stringify(users));
}

function register(){
let u=ruser.value;
let p=rpass.value;
let ref=ref.value;

if(users[u]){alert("User exists");return;}

users[u]={pass:p,money:0};

if(ref && users[ref]){
users[ref].money+=5;
}

save();
alert("Registered সফল");
}

function login(){
let u=luser.value;
let p=lpass.value;

if(users[u] && users[u].pass===p){
currentUser=u;
dash.style.display="block";
money.innerText=users[u].money;
reflink.value=location.href+"?ref="+u;
}else{
alert("Login ভুল");
}
}

function earn(){
users[currentUser].money += 10;
money.innerText=users[currentUser].money;
save();
}

function withdraw(){
if(users[currentUser].money<50){
alert("Minimum 50 টাকা লাগবে");
return;
}
users[currentUser].money-=50;
money.innerText=users[currentUser].money;
save();
alert("Withdraw request sent");
}

function logout(){
dash.style.display="none";
currentUser=null;
}

</script>

</body>
</html>
